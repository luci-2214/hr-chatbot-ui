<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Policy Assistant - Infozech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F8F9FB; height: 100vh; display: flex; flex-direction: column; }
        
        .header {
            background: #204385;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 40px; height: 40px;
            background: #2D68F0;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 14px;
        }
        .header-title { color: white; font-size: 16px; font-weight: 600; }
        .header-sub { color: #EFF4FF; font-size: 12px; opacity: 0.85; }
        .online-dot {
            width: 10px; height: 10px;
            background: #12B76A;
            border-radius: 50%;
            border: 2px solid white;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-row { display: flex; align-items: flex-end; gap: 8px; }
        .message-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            background: #204385;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 11px; font-weight: 700;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 20px;
        }
        .bubble.bot {
            background: white;
            color: #344054;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.1);
        }
        .bubble.user {
            background: #204385;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bubble.error {
            background: #FEF3F2;
            color: #F04438;
            border-left: 3px solid #F04438;
        }
        .time {
            font-size: 10px;
            margin-top: 4px;
            color: #98A2B3;
        }
        .time.user { text-align: right; color: #EFF4FF; opacity: 0.8; }

        .typing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: white;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            color: #667085;
            font-size: 13px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.1);
        }
        .typing-dots span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #204385;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
            margin: 0 1px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .suggestions {
            background: white;
            padding: 10px 0 8px;
            border-top: 1px solid #EAECF0;
        }
        .suggestions-label {
            font-size: 11px;
            color: #667085;
            font-weight: 600;
            padding: 0 16px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .suggestions-list {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .chip {
            background: #EFF4FF;
            border: 1px solid #D0D5DD;
            border-radius: 9999px;
            padding: 8px 14px;
            font-size: 13px;
            color: #204385;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
        }
        .chip:hover { background: #DBEAFE; }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 12px;
            background: white;
            border-top: 1px solid #EAECF0;
        }
        textarea {
            flex: 1;
            background: #F8F9FB;
            border: 1px solid #D0D5DD;
            border-radius: 16px;
            padding: 10px 14px;
            font-size: 14px;
            color: #101828;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            outline: none;
        }
        textarea:focus { border-color: #204385; }
        .send-btn {
            width: 44px; height: 44px;
            background: #204385;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:disabled { background: #D0D5DD; cursor: not-allowed; }
        .send-btn:hover:not(:disabled) { background: #1A3668; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="avatar">HR</div>
        <div>
            <div class="header-title">HR Policy Assistant</div>
            <div class="header-sub">Infozech Software Pvt Ltd</div>
        </div>
    </div>
    <div class="online-dot"></div>
</div>

<div class="messages" id="messages"></div>

<div class="suggestions" id="suggestions">
    <div class="suggestions-label">Quick Questions</div>
    <div class="suggestions-list">
        <div class="chip" onclick="sendMessage('How many casual leaves do I get?')">How many casual leaves do I get?</div>
        <div class="chip" onclick="sendMessage('What is the notice period?')">What is the notice period?</div>
        <div class="chip" onclick="sendMessage('How many days must I come to office?')">How many days must I come to office?</div>
        <div class="chip" onclick="sendMessage('What is the maternity leave policy?')">What is the maternity leave policy?</div>
        <div class="chip" onclick="sendMessage('When is salary credited?')">When is salary credited?</div>
    </div>
</div>

<div class="input-row">
    <textarea id="input" placeholder="Ask an HR policy question..." rows="1" 
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script>
    const API_URL = 'https://luci-2214-hr-policy-chatbot.hf.space/ask';
    
    function getCurrentTime() {
        return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    function addMessage(text, sender, isError=false) {
        const messages = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = `message-row ${sender}`;

        const bubbleHTML = `
            <div class="bubble ${sender} ${isError ? 'error' : ''}">
                ${text.replace(/\n/g, '<br>')}
                <div class="time ${sender}">${getCurrentTime()}</div>
            </div>
        `;

        if (sender === 'bot') {
            row.innerHTML = `<div class="msg-avatar">HR</div>${bubbleHTML}`;
        } else {
            row.innerHTML = bubbleHTML;
        }

        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        const messages = document.getElementById('messages');
        const row = document.createElement('div');
        row.className = 'message-row bot';
        row.id = 'typing';
        row.innerHTML = `
            <div class="msg-avatar">HR</div>
            <div class="typing">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                Fetching policy...
            </div>
        `;
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
    }

    async function sendMessage(text) {
        const input = document.getElementById('input');
        const question = text || input.value.trim();
        if (!question) return;

        input.value = '';
        document.getElementById('suggestions').style.display = 'none';
        document.getElementById('sendBtn').disabled = true;

        addMessage(question, 'user');
        showTyping();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question})
            });
            const data = await response.json();
            hideTyping();
            addMessage(data.answer, 'bot');
        } catch (error) {
            hideTyping();
            addMessage('Unable to connect to the policy server. Please try again.', 'bot', true);
        } finally {
            document.getElementById('sendBtn').disabled = false;
        }
    }

    // Initial greeting
    addMessage("Hello! 👋 I'm the Infozech HR Policy Assistant.\n\nI can answer your questions about leaves, WFH, notice period, attendance, and salary policies.\n\nHow can I help you today?", 'bot');
</script>

</body>
</html>
