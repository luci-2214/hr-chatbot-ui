<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
    <title>HR Assistant — Infozech</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #204385;
            --brand-light: #2D68F0;
            --brand-50: #EFF4FF;
            --grey-50: #F8F9FB;
            --grey-100: #EAECF0;
            --grey-200: #D0D5DD;
            --grey-400: #98A2B3;
            --grey-500: #667085;
            --grey-800: #344054;
            --grey-900: #101828;
            --success: #12B76A;
            --error: #F04438;
            --error-bg: #FEF3F2;
            --white: #FFFFFF;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            background: var(--grey-50);
            color: var(--grey-900);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        /* ── Header ── */
        .header {
            background: var(--brand);
            padding: 12px 16px;
            padding-top: calc(12px + var(--safe-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(32, 67, 133, 0.3);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .h-avatar {
            width: 44px;
            height: 44px;
            background: var(--brand-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
        }

        .h-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        .h-sub {
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            margin-top: 1px;
        }

        .online {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        .online-text {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 500;
        }

        /* ── Messages area ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { display: none; }

        /* ── Message rows ── */
        .row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: fadeUp 0.25s ease;
        }

        .row.user { flex-direction: row-reverse; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            background: var(--brand);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(32,67,133,0.25);
        }

        /* ── Bubbles ── */
        .bubble {
            max-width: calc(100% - 56px);
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.55;
            word-break: break-word;
        }

        .bubble.bot {
            background: var(--white);
            color: var(--grey-800);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(16,24,40,0.08), 0 0 0 1px rgba(16,24,40,0.04);
        }

        .bubble.user {
            background: var(--brand);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(32,67,133,0.3);
        }

        .bubble.error {
            background: var(--error-bg);
            color: var(--error);
            border-left: 3px solid var(--error);
            border-radius: 12px;
        }

        .ts {
            font-size: 11px;
            margin-top: 5px;
            color: var(--grey-400);
            font-family: 'DM Mono', monospace;
        }

        .ts.user {
            color: rgba(255,255,255,0.55);
            text-align: right;
        }

        /* ── Typing indicator ── */
        .typing-bubble {
            background: var(--white);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 1px 4px rgba(16,24,40,0.08);
        }

        .dot {
            width: 7px;
            height: 7px;
            background: var(--brand-light);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Suggestions ── */
        .suggestions {
            background: var(--white);
            border-top: 1px solid var(--grey-100);
            padding: 10px 0 8px;
            flex-shrink: 0;
        }

        .suggestions-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--grey-400);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 0 14px;
            margin-bottom: 8px;
        }

        .chips {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .chips::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--brand-50);
            border: 1.5px solid var(--grey-200);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--brand);
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.15s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .chip:active {
            background: var(--brand);
            color: white;
            transform: scale(0.97);
        }

        /* ── Input bar ── */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px 12px;
            padding-bottom: calc(10px + var(--safe-bottom));
            background: var(--white);
            border-top: 1px solid var(--grey-100);
            flex-shrink: 0;
        }

        .input-wrap {
            flex: 1;
            background: var(--grey-50);
            border: 1.5px solid var(--grey-200);
            border-radius: 22px;
            display: flex;
            align-items: flex-end;
            padding: 2px 4px 2px 16px;
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: var(--brand);
            background: white;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--grey-900);
            resize: none;
            font-family: 'DM Sans', sans-serif;
            line-height: 1.5;
            padding: 9px 0;
            max-height: 100px;
        }

        textarea::placeholder { color: var(--grey-400); }

        .send-btn {
            width: 42px;
            height: 42px;
            background: var(--brand);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(32,67,133,0.3);
        }

        .send-btn:disabled {
            background: var(--grey-200);
            box-shadow: none;
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.93);
        }

        /* ── Date divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--grey-100);
        }

        .divider-text {
            font-size: 11px;
            color: var(--grey-400);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="h-avatar">HR</div>
            <div>
                <div class="h-title">HR Policy Assistant</div>
                <div class="h-sub">Infozech Software Pvt Ltd</div>
            </div>
        </div>
        <div class="online">
            <div class="online-dot"></div>
            <div class="online-text">Online</div>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Suggestions -->
    <div class="suggestions" id="suggestions">
        <div class="suggestions-label">Quick Questions</div>
        <div class="chips">
            <div class="chip" onclick="send('How many casual leaves do I get?')">🏖 Casual leaves</div>
            <div class="chip" onclick="send('What is the notice period?')">📋 Notice period</div>
            <div class="chip" onclick="send('How many days must I come to office?')">🏢 Office days</div>
            <div class="chip" onclick="send('What is the maternity leave policy?')">👶 Maternity leave</div>
            <div class="chip" onclick="send('When is salary credited?')">💰 Salary date</div>
            <div class="chip" onclick="send('What is the WFH policy?')">🏠 WFH policy</div>
            <div class="chip" onclick="send('What is LWP?')">📝 LWP</div>
        </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
        <div class="input-wrap">
            <textarea
                id="input"
                placeholder="Ask an HR policy question..."
                rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
                oninput="autoResize(this)"
            ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
    </div>

</div>

<script>
    const API = 'https://luci-2214-hr-policy-chatbot.hf.space/ask';
    const msgs = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function time() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        sendBtn.disabled = !el.value.trim();
    }

    function scrollDown() {
        setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 80);
    }

    function addDivider(text) {
        const d = document.createElement('div');
        d.className = 'divider';
        d.innerHTML = `<div class="divider-line"></div><div class="divider-text">${text}</div><div class="divider-line"></div>`;
        msgs.appendChild(d);
    }

    function formatAnswer(text) {
    // Clean up the text first
    text = text.trim();

    // Detect grade-level notice period pattern and reformat
    text = text.replace(
        /M0([^.]+)\.\s*M1([^.]+)\.\s*M1-M5([^.]+)\./g,
        function(match, m0, m1, m15) {
            return `\nM0${m0}.\nM1${m1}.\nM1-M5${m15}.`;
        }
    );

    // Split into lines
    let lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);

    if (lines.length <= 1) {
        return `<span>${text}</span>`;
    }

    let html = '';
    let listItems = [];

    const isGradeLine = (l) => /^M[0-9]|^Grade Level|^During probation|^Trainees/i.test(l);
    const isFirstLine = (i) => i === 0;

    lines.forEach((line, i) => {
        if (isFirstLine(i) && !isGradeLine(line)) {
            html += `<p style="margin-bottom:10px;font-weight:500;color:#344054;">${line}</p>`;
        } else if (isGradeLine(line) || lines.length > 1) {
            listItems.push(line);
        } else {
            html += `<p style="margin-bottom:6px;">${line}</p>`;
        }
    });

    if (listItems.length > 0) {
        html += '<div style="display:flex;flex-direction:column;gap:8px;">';
        listItems.forEach(item => {
            // Split on colon to highlight the grade label
            const colonIdx = item.indexOf(':');
            if (colonIdx > -1 && colonIdx < 30) {
                const label = item.substring(0, colonIdx).trim();
                const value = item.substring(colonIdx + 1).trim();
                html += `
                <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:#EFF4FF;border-radius:10px;border-left:3px solid #204385;">
                    <div>
                        <div style="font-weight:600;font-size:13px;color:#204385;">${label}</div>
                        <div style="font-size:14px;color:#344054;margin-top:2px;">${value}</div>
                    </div>
                </div>`;
            } else {
                html += `
                <div style="display:flex;gap:8px;align-items:flex-start;">
                    <span style="color:#204385;font-weight:700;margin-top:2px;flex-shrink:0;">•</span>
                    <span style="color:#344054;">${item}</span>
                </div>`;
            }
        });
        html += '</div>';
    }

    return html;
}

    function addMsg(text, who, isError = false) {
        const row = document.createElement('div');
        row.className = `row ${who}`;

        const bubble = `
            <div class="bubble ${who} ${isError ? 'error' : ''}">
                ${formatAnswer(text)}
                <div class="ts ${who}">${time()}</div>
            </div>
        `;

        if (who === 'bot') {
            row.innerHTML = `<div class="msg-avatar">HR</div>${bubble}`;
        } else {
            row.innerHTML = bubble;
        }

        msgs.appendChild(row);
        scrollDown();
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'row bot';
        row.id = 'typing';
        row.innerHTML = `
            <div class="msg-avatar">HR</div>
            <div class="typing-bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        `;
        msgs.appendChild(row);
        scrollDown();
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    async function send(text) {
        const q = text || input.value.trim();
        if (!q) return;

        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;
        document.getElementById('suggestions').style.display = 'none';

        addMsg(q, 'user');
        showTyping();

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: q })
            });
            const data = await res.json();
            hideTyping();
            addMsg(data.answer || 'No answer found.', 'bot');
        } catch {
            hideTyping();
            addMsg('Unable to connect to the server. Please check your connection and try again.', 'bot', true);
        }
    }

    // Init
    addDivider('Today');
    addMsg("Hello! 👋 I'm your Infozech HR Policy Assistant.\n\nAsk me anything about leaves, WFH, notice period, attendance, or salary policies.", 'bot');

    // Handle keyboard on mobile — scroll when keyboard opens
    window.addEventListener('resize', () => {
        scrollDown();
    });
</script>

</body>
</html>
